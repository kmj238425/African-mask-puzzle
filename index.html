<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아프리카 가면 퍼즐</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap');
  :root { --sand:#e8d5b0; --terra:#c4622d; --brown:#7a4520; --ivory:#f5efe0; --gold:#c8942a; }
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0f0a05; }
  body { display:flex; flex-direction:column; align-items:center;
    font-family:'Noto Sans KR',sans-serif; }

  /* ─ 헤더 ─ */
  header { width:100%; text-align:center; padding:10px 0 6px; flex-shrink:0; }
  h1 { font-family:'Cinzel',serif; font-size:clamp(13px,3.5vw,20px);
    color:var(--gold); letter-spacing:0.1em; text-transform:uppercase; }
  h1 span { display:block; font-size:0.5em; color:var(--sand);
    font-family:'Noto Sans KR',sans-serif; opacity:0.7; margin-top:2px; }

  /* ─ 시작/완성 화면 ─ */
  .screen { display:none; flex-direction:column; align-items:center;
    justify-content:center; flex:1; gap:14px; padding:10px 20px; }
  .screen.active { display:flex; }
  .sil-preview { display:block; }
  .desc { color:var(--sand); font-size:12px; opacity:0.75; }
  .btn { background:linear-gradient(135deg,var(--terra),#9a3c18);
    border:none; color:var(--ivory); font-family:'Noto Sans KR',sans-serif;
    font-size:14px; font-weight:700; padding:12px 40px; border-radius:4px;
    cursor:pointer; box-shadow:0 4px 20px rgba(196,98,45,0.4); }
  .stats { background:rgba(13,8,6,0.9); border:1px solid rgba(200,148,42,0.2);
    border-radius:4px; padding:14px 24px; width:100%; max-width:280px; }
  .stat-row { display:flex; justify-content:space-between;
    padding:5px 0; border-bottom:1px solid rgba(200,148,42,0.07);
    color:var(--sand); font-size:13px; }
  .stat-row:last-child { border-bottom:none; }
  .stat-row strong { color:var(--gold); font-family:'Cinzel',serif; }
  .complete-title { font-family:'Cinzel',serif; font-size:26px; color:var(--gold); }

  /* ─ 게임 화면 ─ */
  #game { display:none; flex-direction:column; align-items:center;
    width:100%; flex:1; overflow:hidden; }
  #game.active { display:flex; }

  /* HUD */
  .hud { display:flex; justify-content:space-between; width:100%;
    padding:4px 12px; background:rgba(13,8,6,0.85);
    border-bottom:1px solid rgba(200,148,42,0.1); flex-shrink:0; }
  .hud-item { text-align:center; }
  .hud-label { font-size:9px; color:var(--gold); display:block; letter-spacing:0.1em; }
  .hud-val { font-size:16px; color:var(--ivory); font-family:'Cinzel',serif; font-weight:700; }
  #timer.warn { color:#e06040; animation:blink .5s infinite alternate; }
  @keyframes blink { to { opacity:.3; } }

  /* 퍼즐판 */
  #board-wrap { display:flex; justify-content:center; align-items:center;
    flex:1; padding:6px 0 2px; overflow:hidden; }
  #board-canvas { display:block; }

  /* 트레이 */
  #tray-wrap { width:100%; padding:6px 8px 8px; flex-shrink:0;
    background:rgba(8,4,2,0.7); border-top:1px solid rgba(200,148,42,0.12); }
  #tray-canvas { display:block; margin:0 auto; }

  /* 버튼 */
  .ctrl-row { display:flex; gap:8px; padding:6px 8px; flex-shrink:0; }
  .ctrl-btn { flex:1; background:transparent;
    border:1px solid rgba(122,69,32,0.45); color:rgba(232,213,176,0.7);
    font-family:'Noto Sans KR',sans-serif; font-size:11px;
    padding:6px 0; border-radius:3px; cursor:pointer; }

  /* 원본 오버레이 */
  .ref-ov { position:fixed; inset:0; background:rgba(0,0,0,0.92);
    display:flex; align-items:center; justify-content:center; z-index:99;
    opacity:0; pointer-events:none; transition:opacity .2s; }
  .ref-ov.show { opacity:1; pointer-events:all; }
  .ref-ov img { max-width:60vw; max-height:80vh; object-fit:contain;
    border:2px solid var(--gold); }
</style>
</head>
<body>
<header>
  <h1>African Mask Puzzle<span>박물관 소장품 · 퍼즐 게임</span></h1>
</header>

<!-- 시작 화면 -->
<div class="screen active" id="start">
  <canvas class="sil-preview" id="prev-canvas" width="70" height="200"></canvas>
  <p class="desc">3 × 3 · 9조각</p>
  <button class="btn" id="start-btn">게임 시작</button>
</div>

<!-- 게임 화면 -->
<div id="game">
  <div class="hud">
    <div class="hud-item"><span class="hud-label">이동</span><span class="hud-val" id="moves">0</span></div>
    <div class="hud-item"><span class="hud-label">완성도</span><span class="hud-val" id="prog">0%</span></div>
    <div class="hud-item"><span class="hud-label">시간</span><span class="hud-val" id="timer">00:00</span></div>
  </div>
  <div id="board-wrap"><canvas id="board-canvas"></canvas></div>
  <div id="tray-wrap"><canvas id="tray-canvas"></canvas></div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="ref-btn">🖼 원본 보기</button>
    <button class="ctrl-btn" id="retry-btn">🔀 다시 섞기</button>
  </div>
</div>

<!-- 완성 화면 -->
<div class="screen" id="done">
  <div class="complete-title">🎉 완성!</div>
  <img id="done-img" style="width:70px;height:auto;border:2px solid var(--gold);" alt="">
  <div class="stats">
    <div class="stat-row"><span>난이도</span><strong>쉬움 (3×3)</strong></div>
    <div class="stat-row"><span>소요 시간</span><strong id="res-time">—</strong></div>
    <div class="stat-row"><span>이동 횟수</span><strong id="res-moves">—</strong></div>
  </div>
  <button class="btn" id="replay-btn">다시 도전</button>
</div>

<!-- 원본 오버레이 -->
<div class="ref-ov" id="ref-ov">
  <img id="ref-img" alt="">
</div>

const GRID = 3;

let boardW, boardH, cellW, cellH;
let thumbW, thumbH; // 트레이 썸네일 크기
let pieces = [];
let drag = null;
let moves = 0, secs = 0, ticker = null;
let pieceCvs = {}; // 실루엣 클리핑된 조각 캔버스
let bgCvs = null;  // 퍼즐판 배경

const boardCvs = document.getElementById('board-canvas');
const bCtx = boardCvs.getContext('2d');
const trayCvs = document.getElementById('tray-canvas');
const tCtx = trayCvs.getContext('2d');
const img = new Image();

// ── 이미지 로드 ──
img.onload = () => {
  // 시작 화면 실루엣
  const pc = document.getElementById('prev-canvas');
  drawSilCanvas(pc.getContext('2d'), pc.width, pc.height);
  // 완성 화면
  document.getElementById('done-img').src = IMG_SRC;
  document.getElementById('ref-img').src = IMG_SRC;
};
img.src = IMG_SRC;

// 실루엣 배경 그리기 (갈색 + 물음표)
function drawSilCanvas(ctx, w, h) {
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').drawImage(img, 0, 0, w, h);
  const td = tmp.getContext('2d').getImageData(0, 0, w, h).data;
  const id = ctx.createImageData(w, h);
  const d = id.data;
  for (let i = 0; i < w * h; i++) {
    if (td[i*4+3] > 30) {
      d[i*4]=90; d[i*4+1]=60; d[i*4+2]=25; d[i*4+3]=255;
    }
  }
  ctx.putImageData(id, 0, 0);
  ctx.font = 'bold ' + Math.round(h*0.25) + 'px Cinzel,serif';
  ctx.fillStyle = 'rgba(200,148,42,0.9)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(200,148,42,0.5)'; ctx.shadowBlur = 10;
  ctx.fillText('?', w/2, h/2);
}

// 실루엣 픽셀 판별
function silAt(px, py) {
  const sx = Math.min(SIL.w-1, Math.max(0, Math.round(px/boardW*SIL.w)));
  const sy = Math.min(SIL.h-1, Math.max(0, Math.round(py/boardH*SIL.h)));
  return SIL.data[sy*SIL.w+sx] === 1;
}

// 조각 캔버스 생성 (픽셀 단위 실루엣 클리핑)
function getPieceCvs(col, row) {
  const key = col+'_'+row;
  if (pieceCvs[key]) return pieceCvs[key];
  const oc = document.createElement('canvas');
  oc.width = Math.ceil(cellW); oc.height = Math.ceil(cellH);
  const ctx = oc.getContext('2d');
  const sw = img.naturalWidth/GRID, sh = img.naturalHeight/GRID;
  ctx.drawImage(img, col*sw, row*sh, sw, sh, 0, 0, cellW, cellH);
  const id = ctx.getImageData(0, 0, oc.width, oc.height);
  const d = id.data;
  for (let py = 0; py < oc.height; py++) {
    for (let px = 0; px < oc.width; px++) {
      if (!silAt(col*cellW+px, row*cellH+py)) {
        d[(py*oc.width+px)*4+3] = 0;
      }
    }
  }
  ctx.putImageData(id, 0, 0);
  pieceCvs[key] = oc;
  return oc;
}

// 퍼즐판 배경 (갈색 실루엣)
function makeBg() {
  const oc = document.createElement('canvas');
  oc.width = boardW; oc.height = boardH;
  const ctx = oc.getContext('2d');
  const id = ctx.createImageData(boardW, boardH);
  const d = id.data;
  for (let py = 0; py < boardH; py++) {
    for (let px = 0; px < boardW; px++) {
      const i = (py*boardW+px)*4;
      if (silAt(px, py)) { d[i]=90;d[i+1]=60;d[i+2]=25;d[i+3]=230; }
    }
  }
  ctx.putImageData(id, 0, 0);
  bgCvs = oc;
}

// ── 게임 시작 ──
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('retry-btn').addEventListener('click', startGame);
document.getElementById('replay-btn').addEventListener('click', () => {
  show('start');
});

function show(id) {
  ['start','game','done'].forEach(s => {
    const el = document.getElementById(s);
    el.classList.remove('active');
    el.style.display = '';
  });
  const el = document.getElementById(id);
  if (id === 'game') { el.style.display = 'flex'; el.classList.add('active'); }
  else { el.style.display = 'flex'; el.classList.add('active'); }
}

function startGame() {
  show('game');
  pieceCvs = {}; bgCvs = null;
  moves = 0; secs = 0;
  document.getElementById('timer').classList.remove('warn');
  if (ticker) clearInterval(ticker);
  ticker = setInterval(() => { secs++; updateTimer(); }, 1000);

  // ── 크기 계산 ──
  const W = window.innerWidth;
  const H = window.innerHeight;
  const HEADER_H = document.querySelector('header').offsetHeight;
  const HUD_H = 36;
  const CTRL_H = 46;
  const GAP = 4;

  // 트레이 높이를 화면의 25%로 고정
  const TRAY_H = Math.floor(H * 0.25);
  thumbH = TRAY_H - GAP * 2;
  // thumbW = thumbH * (imgW/imgH) — 이미지 비율대로 (세로가 길어서 thumbW가 작아짐)
  thumbW = Math.round(thumbH * (img.naturalWidth / img.naturalHeight));

  // 퍼즐판: 남은 높이
  const availH = H - HEADER_H - HUD_H - TRAY_H - CTRL_H - 12;
  boardH = Math.max(80, Math.min(availH, 500));
  boardW = Math.round(boardH * (img.naturalWidth / img.naturalHeight));

  cellW = boardW / GRID; cellH = boardH / GRID;

  boardCvs.width = boardW; boardCvs.height = boardH;
  document.getElementById('board-wrap').style.minHeight = boardH + 'px';

  // 트레이
  trayCvs.width = W; trayCvs.height = thumbH + GAP*2;
  document.getElementById('tray-wrap').style.width = W + 'px';

  // 배경 & 조각 생성
  makeBg();

  pieces = [];
  for (let r = 0; r < GRID; r++)
    for (let c = 0; c < GRID; c++)
      pieces.push({ col:c, row:r, placed:false, inTray:true });

  // 트레이 위치 (가로 균등)
  const totalW = pieces.length * (thumbW + GAP) - GAP;
  const startX = Math.floor((W - totalW) / 2);
  const shuffled = [...pieces].sort(() => Math.random() - 0.5);
  shuffled.forEach((p, i) => {
    p.tx = startX + i * (thumbW + GAP);
    p.ty = GAP;
  });

  updateHUD(); renderBoard(); renderTray();
}

// ── 렌더 ──
function renderBoard() {
  bCtx.clearRect(0, 0, boardW, boardH);
  if (bgCvs) bCtx.drawImage(bgCvs, 0, 0);

  pieces.filter(p => p.placed).forEach(p => {
    const oc = getPieceCvs(p.col, p.row);
    bCtx.drawImage(oc, p.col*cellW, p.row*cellH);
    bCtx.strokeStyle = 'rgba(200,148,42,0.35)';
    bCtx.lineWidth = 1;
    bCtx.strokeRect(p.col*cellW, p.row*cellH, cellW, cellH);
  });

  if (drag && !drag.fromTray) {
    const oc = getPieceCvs(drag.p.col, drag.p.row);
    bCtx.save();
    bCtx.shadowColor='rgba(200,148,42,0.8)'; bCtx.shadowBlur=16;
    bCtx.drawImage(oc, drag.bx - drag.ox, drag.by - drag.oy);
    bCtx.restore();
  }
  if (drag && drag.fromTray && drag.ghostCol != null) {
    const oc = getPieceCvs(drag.p.col, drag.p.row);
    bCtx.save(); bCtx.globalAlpha = 0.45;
    bCtx.drawImage(oc, drag.ghostCol*cellW, drag.ghostRow*cellH);
    bCtx.restore();
  }
}

function renderTray() {
  tCtx.clearRect(0, 0, trayCvs.width, trayCvs.height);
  pieces.filter(p => p.inTray && (!drag || drag.p !== p)).forEach(p => drawThumb(p, p.tx, p.ty, false));
  if (drag && drag.fromTray) drawThumb(drag.p, drag.tx - drag.tox, drag.ty - drag.toy, true);
}

function drawThumb(p, dx, dy, active) {
  const oc = getPieceCvs(p.col, p.row);
  tCtx.save();
  if (active) { tCtx.shadowColor='rgba(200,148,42,0.8)'; tCtx.shadowBlur=14; }
  else { tCtx.shadowColor='rgba(0,0,0,0.5)'; tCtx.shadowBlur=6; tCtx.shadowOffsetY=2; }
  tCtx.drawImage(oc, 0, 0, Math.ceil(cellW), Math.ceil(cellH), dx, dy, thumbW, thumbH);
  tCtx.shadowBlur=0; tCtx.shadowOffsetY=0;
  tCtx.strokeStyle = active ? 'rgba(200,148,42,0.9)' : 'rgba(180,130,50,0.5)';
  tCtx.lineWidth = 1;
  tCtx.strokeRect(dx+.5, dy+.5, thumbW-1, thumbH-1);
  tCtx.restore();
}

// ── 입력 ──
function bPos(e) {
  const r = boardCvs.getBoundingClientRect(), s = e.touches?e.touches[0]:e;
  return { x:(s.clientX-r.left)*(boardW/r.width), y:(s.clientY-r.top)*(boardH/r.height) };
}
function tPos(e) {
  const r = trayCvs.getBoundingClientRect(), s = e.touches?e.touches[0]:e;
  return { x:(s.clientX-r.left)*(trayCvs.width/r.width), y:(s.clientY-r.top)*(trayCvs.height/r.height) };
}

trayCvs.addEventListener('mousedown', e=>{e.preventDefault();onTDown(e);});
trayCvs.addEventListener('touchstart', e=>{e.preventDefault();onTDown(e);},{passive:false});
function onTDown(e) {
  const pos = tPos(e);
  let found = null;
  for (let i = pieces.length-1; i >= 0; i--) {
    const p = pieces[i];
    if (!p.inTray) continue;
    if (pos.x>=p.tx && pos.x<=p.tx+thumbW && pos.y>=p.ty && pos.y<=p.ty+thumbH) { found=p; break; }
  }
  if (!found) return;
  drag = { p:found, fromTray:true,
    tx:pos.x, ty:pos.y, tox:pos.x-found.tx, toy:pos.y-found.ty,
    ghostCol:null, ghostRow:null };
  renderTray();
}

boardCvs.addEventListener('mousedown', e=>{e.preventDefault();onBDown(e);});
boardCvs.addEventListener('touchstart', e=>{e.preventDefault();onBDown(e);},{passive:false});
function onBDown(e) {
  const pos = bPos(e);
  let found = null;
  for (let i = pieces.length-1; i >= 0; i--) {
    const p = pieces[i];
    if (!p.placed) continue;
    if (pos.x>=p.col*cellW && pos.x<=(p.col+1)*cellW && pos.y>=p.row*cellH && pos.y<=(p.row+1)*cellH) { found=p; break; }
  }
  if (!found) return;
  found.placed = false; moves++;
  drag = { p:found, fromTray:false, bx:pos.x, by:pos.y, ox:pos.x-found.col*cellW, oy:pos.y-found.row*cellH };
  updateHUD(); renderBoard();
}

document.addEventListener('mousemove', onMove);
document.addEventListener('touchmove', onMove, {passive:false});
function onMove(e) {
  if (!drag) return; e.preventDefault();
  const s = e.touches?e.touches[0]:e;
  if (drag.fromTray) {
    const tr = trayCvs.getBoundingClientRect();
    drag.tx = (s.clientX-tr.left)*(trayCvs.width/tr.width);
    drag.ty = (s.clientY-tr.top)*(trayCvs.height/tr.height);
    const br = boardCvs.getBoundingClientRect();
    if (s.clientX>=br.left&&s.clientX<=br.right&&s.clientY>=br.top&&s.clientY<=br.bottom) {
      drag.ghostCol = Math.floor((s.clientX-br.left)*(boardW/br.width)/cellW);
      drag.ghostRow = Math.floor((s.clientY-br.top)*(boardH/br.height)/cellH);
      if (drag.ghostCol<0||drag.ghostCol>=GRID||drag.ghostRow<0||drag.ghostRow>=GRID) { drag.ghostCol=null; }
    } else { drag.ghostCol=null; }
    renderTray(); renderBoard();
  } else {
    const br = boardCvs.getBoundingClientRect();
    drag.bx = (s.clientX-br.left)*(boardW/br.width);
    drag.by = (s.clientY-br.top)*(boardH/br.height);
    renderBoard();
  }
}

document.addEventListener('mouseup', onUp);
document.addEventListener('touchend', onUp, {passive:false});
function onUp(e) {
  if (!drag) return;
  const s = e.changedTouches?e.changedTouches[0]:e;
  const p = drag.p;
  const br = boardCvs.getBoundingClientRect();
  const onBoard = s.clientX>=br.left&&s.clientX<=br.right&&s.clientY>=br.top&&s.clientY<=br.bottom;
  if (onBoard) {
    const bx = (s.clientX-br.left)*(boardW/br.width);
    const by = (s.clientY-br.top)*(boardH/br.height);
    const col = Math.floor(bx/cellW), row = Math.floor(by/cellH);
    if (col>=0&&col<GRID&&row>=0&&row<GRID) {
      const occ = pieces.some(q=>q.placed&&q.col===col&&q.row===row);
      if (!occ) {
        p.placed=true; p.inTray=false;
        if (drag.fromTray) moves++;
        updateHUD(); drag=null;
        renderBoard(); renderTray(); checkWin(); return;
      }
    }
  }
  p.inTray=true; p.placed=false;
  drag=null; renderBoard(); renderTray();
}

function pad(n){return String(n).padStart(2,'0');}
function updateTimer(){
  const m=Math.floor(secs/60),s=secs%60;
  const el=document.getElementById('timer');
  el.textContent=pad(m)+':'+pad(s);
  el.classList.toggle('warn',secs>180);
}
function updateHUD(){
  document.getElementById('moves').textContent=moves;
  const n=pieces.filter(p=>p.placed).length;
  document.getElementById('prog').textContent=Math.round(n/pieces.length*100)+'%';
}
function checkWin(){
  if(pieces.every(p=>p.placed)){
    clearInterval(ticker); ticker=null;
    setTimeout(()=>{
      const m=Math.floor(secs/60),s=secs%60;
      document.getElementById('res-time').textContent=pad(m)+'분 '+pad(s)+'초';
      document.getElementById('res-moves').textContent=moves+'번';
      show('done');
    },500);
  }
}

// 원본 보기
const refOv=document.getElementById('ref-ov');
document.getElementById('ref-btn').addEventListener('mousedown',()=>refOv.classList.add('show'));
document.getElementById('ref-btn').addEventListener('mouseup',()=>refOv.classList.remove('show'));
document.getElementById('ref-btn').addEventListener('touchstart',e=>{e.preventDefault();refOv.classList.add('show');},{passive:false});
document.getElementById('ref-btn').addEventListener('touchend',()=>refOv.classList.remove('show'));
refOv.addEventListener('click',()=>refOv.classList.remove('show'));
</script>
